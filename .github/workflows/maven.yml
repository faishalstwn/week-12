name: Build

on:
  push:
    branches:
      - main
      - fitur-baru
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build with Maven + SonarCloud
        run: mvn clean verify sonar:sonar -Dsonar.projectKey=faishalstwn_week-12 -Dsonar.organization=faishalstwn -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
